name: Platform Docker images

# Optional CI: build worker/API images. Enable push credentials in your fork if needed.
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'platform/docker/**'
      - 'platform/api/**'
      - 'src/crawlee/**'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/docker/Dockerfile.api
          push: false
          tags: crawlee-platform-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image (smoke)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: platform/docker/Dockerfile.worker
          push: false
          tags: crawlee-platform-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional (disabled): run sample Crawlee task inside image — enable only with explicit network policy.
      # - name: Worker crawl smoke
      #   if: false
      #   run: docker run --rm crawlee-platform-worker:ci python -c "print('smoke')"
